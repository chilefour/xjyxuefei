    </div>
</div><script>
var config = {
    "primary_s1": { name: "2025-2026 第一学期 (小学105天)", start: "2025-09-01", end: "2026-01-30", days: 105, mealRate: 47, mealCap: 4400, acc: 6000, bus: 4000, delay: 0 },
    "primary_s2": { name: "2025-2026 第二学期 (小学89天)", start: "2026-02-26", end: "2026-07-03", days: 89, mealRate: 47, mealCap: 4400, acc: 6000, bus: 4000, delay: 0 },
    "middle_s1": { name: "2025-2026 第一学期 (初中105天)", start: "2025-09-01", end: "2026-01-30", days: 105, mealRate: 53, mealCap: 5830, acc: 6000, bus: 0, delay: 676 },
    "middle_s2_g12": { name: "2025-2026 第二学期 (初一/初二 90天)", start: "2026-02-25", end: "2026-07-03", days: 90, mealRate: 53, mealCap: 4770, acc: 6000, bus: 0, delay: 560 },
    "middle_s2_g3": { name: "2025-2026 第二学期 (初三 84天+周日)", start: "2026-02-25", end: "2026-06-25", days: 84, mealRate: 53, mealCap: 4452, acc: 6000, bus: 0, delay: 784, sunRate: 18, sunTotal: 12 }
};

var holidays = [
    "2025-01-01","2025-01-28","2025-01-29","2025-01-30","2025-01-31","2025-02-01","2025-02-02","2025-02-03","2025-02-04",
    "2025-04-04","2025-04-05","2025-04-06","2025-05-01","2025-05-02","2025-05-03","2025-05-04","2025-05-05",
    "2025-05-31","2025-06-01","2025-06-02",
    "2025-10-01","2025-10-02","2025-10-03","2025-10-04","2025-10-05","2025-10-06","2025-10-07","2025-10-08",
    "2026-01-01","2026-01-02","2026-01-03",
    "2026-02-15","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-21","2026-02-22","2026-02-23",
    "2026-04-04","2026-04-05","2026-04-06",
    "2026-05-01","2026-05-02","2026-05-03","2026-05-04","2026-05-05",
    "2026-06-19","2026-06-20","2026-06-21",
    "2026-09-25","2026-09-26","2026-09-27",
    "2026-10-01","2026-10-02","2026-10-03","2026-10-04","2026-10-05","2026-10-06","2026-10-07","2026-10-08"
];
var makeUpWorkdays = [
    "2025-01-26","2025-02-08","2025-04-27","2025-09-28","2025-10-11","2025-12-28",
    "2026-02-14","2026-02-28","2026-04-26","2026-09-27","2026-10-10"
];
var specificSundays = [
    "2026-03-01","2026-03-08","2026-03-15","2026-03-22","2026-03-29",
    "2026-04-12","2026-04-19",
    "2026-05-10","2026-05-17","2026-05-24","2026-05-31",
    "2026-06-07"
];

function formatDate(d) {    var m = '' + (d.getMonth() + 1), dy = '' + d.getDate(), y = d.getFullYear();
    if (m.length < 2) m = '0' + m;
    if (dy.length < 2) dy = '0' + dy;
    return [y, m, dy].join('-');
}
function parseDate(str) {
    var parts = str.split('-');
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}
function isSchoolDay(dateStr) {
    if (makeUpWorkdays.includes(dateStr)) return true;
    if (holidays.includes(dateStr)) return false;
    var d = new Date(dateStr);
    var day = d.getDay();
    return day !== 0 && day !== 6;
}
function getWorkingDays(startStr, endStr) {
    var start = parseDate(startStr), end = parseDate(endStr);
    if (isNaN(start) || isNaN(end) || start > end) return 0;
    var count = 0, cur = new Date(start);
    for (var i = 0; i < 300 && cur <= end; i++) {
        if (isSchoolDay(formatDate(cur))) count++;
        cur.setDate(cur.getDate() + 1);
    }
    return count;
}
function getSundayDays(startStr, endStr) {
    var start = parseDate(startStr), end = parseDate(endStr);
    if (isNaN(start) || isNaN(end) || start > end) return 0;
    var count = 0, cur = new Date(start);
    for (var i = 0; i < 300 && cur <= end; i++) {
        if (specificSundays.includes(formatDate(cur))) count++;
        cur.setDate(cur.getDate() + 1);
    }
    return count;
}

// ==================== 自然月计算引擎 ====================
function getAnchorCycleStart(anchor, i) {
    return new Date(anchor.getFullYear(), anchor.getMonth() + i, anchor.getDate());
}
function getAnchorCycleEnd(anchor, i) {
    var next = getAnchorCycleStart(anchor, i + 1);
    next.setDate(next.getDate() - 1);
    return next;
}
function calcNaturalMonths(startStr, endStr, anchorStr, mode) {
    var start = parseDate(startStr), end = parseDate(endStr), anchor = parseDate(anchorStr);
    if (isNaN(start) || isNaN(end) || isNaN(anchor) || start > end) return 0;
    var totalMonths = 0;
    for (var i = 0; i < 24; i++) {
        var cycleStart = getAnchorCycleStart(anchor, i);
        var cycleEnd = getAnchorCycleEnd(anchor, i);
        if (cycleEnd < start) continue;
        if (cycleStart > end) break;
        var overlapStart = start > cycleStart ? start : cycleStart;
        var overlapEnd = end < cycleEnd ? end : cycleEnd;
        var overlapDays = Math.floor((overlapEnd - overlapStart) / (1000 * 60 * 60 * 24)) + 1;
        if (overlapDays <= 0) continue;
        var cycleDays = Math.floor((cycleEnd - cycleStart) / (1000 * 60 * 60 * 24)) + 1;
        var halfCycle = Math.ceil(cycleDays / 2);
        if (mode === 'charge') {
            totalMonths += (overlapDays >= halfCycle) ? 1 : 0.5;
        } else {
            totalMonths += (overlapDays > halfCycle) ? 1 : 0.5;
        }
    }
    return totalMonths;
}
function calcTotalNaturalMonths(anchorStr, endStr) {
    return calcNaturalMonths(anchorStr, endStr, anchorStr, 'charge');
}
function getElapsedNaturalMonths(anchorStr, dateStr) {
    var anchor = parseDate(anchorStr), d = parseDate(dateStr);
    if (isNaN(anchor) || isNaN(d) || d <= anchor) return 0;
    for (var i = 0; i < 24; i++) {
        var cycleStart = getAnchorCycleStart(anchor, i);
        var cycleEnd = getAnchorCycleEnd(anchor, i);
        if (d >= cycleStart && d <= cycleEnd) return i;
    }
    return 12;
}
function isOverOneMonth(enrollStr, eventStr) {
    var enroll = parseDate(enrollStr), ev = parseDate(eventStr);
    if (isNaN(enroll) || isNaN(ev)) return false;
    var oneMonthLater = getAnchorCycleStart(enroll, 1);
    return ev >= oneMonthLater;
}
function getTuitionRatio(startStr, enrollStr) {
    if (parseDate(enrollStr) <= parseDate(startStr)) return { ratio: 1, text: "100% (学期初入学)" };
    var elapsed = getElapsedNaturalMonths(startStr, enrollStr);
    if (elapsed < 1) return { ratio: 0.95, text: "95% (开学不满1个月)" };
    if (elapsed < 2) return { ratio: 0.80, text: "80% (开学满1月不满2月)" };
    if (elapsed < 3) return { ratio: 0.60, text: "60% (开学满2月不满3月)" };
    return { ratio: 0.40, text: "40% (开学满3个月及以上)" };
}

// ==================== 餐费计算 ====================
function calcMealCharge(attended, absent, rate, cap) {
    var A = attended * rate;
    var B = cap - absent * rate;
    var charge = Math.max(A, B);
    if (charge > cap) charge = cap;
    if (charge < 0) charge = 0;
    var note = "";
    if (A >= B) {
        note = "有来天数(" + attended + ")×" + rate + " = " + A.toFixed(2) + " ≥ 总额" + cap + " - 没来天数(" + absent + ")×" + rate + " = " + B.toFixed(2) + "，收费取高者：" + charge.toFixed(2) + "元";
    } else {
        note = "总额" + cap + " - 没来天数(" + absent + ")×" + rate + " = " + B.toFixed(2) + " > 有来天数(" + attended + ")×" + rate + " = " + A.toFixed(2) + "，收费取高者：" + charge.toFixed(2) + "元";
    }
    return { charge: charge, note: note };
}
function calcMealRefund(attended, absent, rate, paidMeal) {
    var A = absent * rate;
    var C = paidMeal - attended * rate;
    if (C < 0) C = 0;
    var refund = Math.min(A, C);
    if (refund < 0) refund = 0;
    var note = "";
    if (A <= C) {
        note = "没来天数(" + absent + ")×" + rate + " = " + A.toFixed(2) + " ≤ 实收(" + paidMeal.toFixed(2) + ") - 有来天数(" + attended + ")×" + rate + " = " + C.toFixed(2) + "，退费取低者：" + refund.toFixed(2) + "元";
    } else {
        note = "实收(" + paidMeal.toFixed(2) + ") - 有来天数(" + attended + ")×" + rate + " = " + C.toFixed(2) + " < 没来天数(" + absent + ")×" + rate + " = " + A.toFixed(2) + "，退费取低者：" + refund.toFixed(2) + "元";
    }
    return { refund: refund, note: note };
}

// ==================== 延时费计算 ====================
function calcDelayCharge(enrollStr, endStr, anchorStr, totalDelay) {
    var tMonths = calcTotalNaturalMonths(anchorStr, endStr);
    if (tMonths <= 0) tMonths = 5;
    var monthRate = totalDelay / tMonths;
    var participateMonths = calcNaturalMonths(enrollStr, endStr, anchorStr, 'charge');
    var dayBeforeEnroll = new Date(parseDate(enrollStr));
    dayBeforeEnroll.setDate(dayBeforeEnroll.getDate() - 1);
    var missedMonths = 0;
    if (dayBeforeEnroll >= parseDate(anchorStr)) {
        missedMonths = calcNaturalMonths(anchorStr, formatDate(dayBeforeEnroll), anchorStr, 'deduct');
    }
    var chargeA = monthRate * participateMonths;
    var chargeB = totalDelay - monthRate * missedMonths;
    var charge = Math.max(chargeA, chargeB);
    if (charge > totalDelay) charge = totalDelay;
    if (charge < 0) charge = 0;
    var note = "总" + tMonths + "个月，月单价" + monthRate.toFixed(2) + "元。";
    note += " 算法A: " + monthRate.toFixed(2) + "×" + participateMonths + "月=" + chargeA.toFixed(2);
    note += " 算法B: " + totalDelay + "-" + monthRate.toFixed(2) + "×" + missedMonths + "月=" + chargeB.toFixed(2);
    note += " → 收费取高者: " + charge.toFixed(2) + "元";
    return { charge: charge, tMonths: tMonths, monthRate: monthRate, note: note };
}
function calcDelayRefund(enrollStr, eventStr, endStr, anchorStr, totalDelay, paidDelay) {
    var tMonths = calcTotalNaturalMonths(anchorStr, endStr);
    if (tMonths <= 0) tMonths = 5;
    var monthRate = totalDelay / tMonths;
    var evObj = new Date(parseDate(eventStr));
    evObj.setDate(evObj.getDate() - 1);
    var lastDay = formatDate(evObj);
    var consumedMonths = 0;
    if (parseDate(lastDay) >= parseDate(enrollStr)) {
        consumedMonths = calcNaturalMonths(enrollStr, lastDay, anchorStr, 'charge');
    }
    var remainMonths = calcNaturalMonths(eventStr, endStr, anchorStr, 'deduct');
    var refundA = monthRate * remainMonths;
    var refundC = paidDelay - monthRate * consumedMonths;
    if (refundC < 0) refundC = 0;
    var refund = Math.min(refundA, refundC);
    if (refund < 0) refund = 0;
    var note = "月单价" + monthRate.toFixed(2) + "元。";
    note += " 算法A: " + monthRate.toFixed(2) + "×" + remainMonths + "月=" + refundA.toFixed(2);
    note += " 算法C: 实收" + paidDelay.toFixed(2) + "-" + monthRate.toFixed(2) + "×" + consumedMonths + "月=" + refundC.toFixed(2);
    note += " → 退费取低者: " + refund.toFixed(2) + "元";
    return { refund: refund, note: note, consumedMonths: consumedMonths, remainMonths: remainMonths };
}

// ==================== 校车费计算 ====================
function calcBusCharge(enrollStr, endStr, anchorStr, totalBus) {
    var monthRate = totalBus / 5;
    var dayBefore = new Date(parseDate(enrollStr));
    dayBefore.setDate(dayBefore.getDate() - 1);
    var missedMonths = 0;
    if (dayBefore >= parseDate(anchorStr)) {
        missedMonths = calcNaturalMonths(anchorStr, formatDate(dayBefore), anchorStr, 'deduct');
    }
    var chargeMonths = 5 - missedMonths;
    if (chargeMonths > 5) chargeMonths = 5;
    if (chargeMonths < 0) chargeMonths = 0;
    var charge = chargeMonths * monthRate;
    if (charge > totalBus) charge = totalBus;
    var note = "校车月费" + monthRate.toFixed(0) + "元/月，扣除未乘坐" + missedMonths + "个月，收取" + chargeMonths + "个月 = " + charge.toFixed(2) + "元";
    return { charge: charge, note: note, chargeMonths: chargeMonths };
}
function calcBusRefund(attended, totalDays, paidBus) {
    var halfDays = Math.floor(totalDays / 2);
    var refund = 0, note = "";
    if (attended <= halfDays) {
        refund = paidBus - 2000;
        if (refund < 0) refund = 0;
        note = "乘坐天数(" + attended + "天)未超过半学期(" + halfDays + "天)，按半学期2000元收取，退还 " + paidBus.toFixed(2) + "-2000 = " + refund.toFixed(2) + "元";
    } else {
        refund = paidBus - 4000;
        if (refund < 0) refund = 0;
        note = "乘坐天数(" + attended + "天)超过半学期(" + halfDays + "天)，按全学期4000元收取，退还 " + paidBus.toFixed(2) + "-4000 = " + refund.toFixed(2) + "元";
    }
    return { refund: refund, note: note };
}
function makeItem(label, value, tip) {
    var html = '<div class="detail-item"><span>' + label + ':</span><span>' + value + '</span>';
    if (tip) html += '<span class="tip" style="width:100%;">' + tip + '</span>';
    html += '</div>';
    return html;
}

// ==================== 页面交互 ====================
var currentConfig = {};
window.onload = function () { changeSchool(); };

function changeSchool() {
    var isPrimary = document.querySelector('input[name="school"]:checked').value === 'primary';
    var sem = document.getElementById('semester');
    sem.innerHTML = '';
    if (isPrimary) {
        sem.add(new Option(config.primary_s1.name, 'primary_s1'));
        sem.add(new Option(config.primary_s2.name, 'primary_s2'));
    } else {
        sem.add(new Option(config.middle_s1.name, 'middle_s1'));
        sem.add(new Option(config.middle_s2_g12.name, 'middle_s2_g12'));
        sem.add(new Option(config.middle_s2_g3.name, 'middle_s2_g3'));
    }
    var sc = document.getElementById('scenario');
    sc.innerHTML = '';
    sc.add(new Option('✅ 入学 (新生/中途)', 'enroll'));
    sc.add(new Option('⏸ 请假 (直填天数)', 'leave'));
    sc.add(new Option('⏸ 休学', 'suspend'));
    sc.add(new Option('⏹ 中途转学', 'withdraw'));
    if (isPrimary) {
        sc.add(new Option('🚌 住宿转校车', 'board_to_bus'));
        sc.add(new Option('🛏 校车转住宿', 'bus_to_board'));
    }
    sc.add(new Option('📉 试读代收费结算', 'trial_fail'));
    sc.add(new Option('⛔ 强制转学', 'force_quit'));
    var sv = document.getElementById('serviceType');
    sv.innerHTML = '';
    sv.add(new Option('寄宿 (含住宿费)', 'board'));
    sv.add(new Option('走读 (无住宿/无校车)', 'day'));
    if (isPrimary) sv.add(new Option('校车 (含校车费)', 'bus'));
    updateSemesterData();
}

function updateSemesterData() {
    var key = document.getElementById('semester').value;
    currentConfig = config[key];
    document.getElementById('startDate').value = currentConfig.start;
    document.getElementById('endDate').value = currentConfig.end;
    document.getElementById('enrollDate').value = currentConfig.start;
    document.getElementById('eventDate').value = currentConfig.start;
    document.getElementById('boardDate').value = currentConfig.start;
    document.getElementById('busDate').value = currentConfig.start;
    toggleFields();
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }

function toggleFields() {
    var sc = document.getElementById('scenario').value;
    var key = document.getElementById('semester').value;
    ['eventDateCol','multiDateGroup','enrollDateCol','boardDateCol','busDateCol',
     'daysGroup','attendedDaysCol','absentDaysCol','leaveDaysCol','trialDaysCol','sundayDaysCol'
    ].forEach(function(id) { document.getElementById(id).classList.add('hidden'); });

    if (sc === 'enroll') {
        show('multiDateGroup'); show('enrollDateCol');
        show('daysGroup'); show('attendedDaysCol'); show('absentDaysCol');
        autoCalculateDays();
    } else if (sc === 'withdraw' || sc === 'suspend') {
        show('eventDateCol');
        document.getElementById('eventDateLabel').innerText = sc === 'withdraw' ? "正式转学日期" : "休学日期";
        document.getElementById('eventDateTip').innerText = "指不再来学校的那天（不含当天）";
        show('multiDateGroup'); show('enrollDateCol');
        show('daysGroup'); show('attendedDaysCol'); show('absentDaysCol');
        autoCalculateDays();
    } else if (sc === 'leave') {
        show('daysGroup'); show('leaveDaysCol');
    } else if (sc === 'board_to_bus') {
        show('eventDateCol');
        document.getElementById('eventDateLabel').innerText = "转换生效日期";
        document.getElementById('eventDateTip').innerText = "";
        show('multiDateGroup'); show('enrollDateCol');
        show('boardDateCol');
    } else if (sc === 'bus_to_board') {
        show('eventDateCol');
        document.getElementById('eventDateLabel').innerText = "转换生效日期";
        document.getElementById('eventDateTip').innerText = "";
        show('multiDateGroup'); show('enrollDateCol');
        show('busDateCol');
    } else if (sc === 'trial_fail') {
        show('daysGroup'); show('trialDaysCol');
    }

    if (key === 'middle_s2_g3' && ['enroll','withdraw','suspend','leave','trial_fail'].includes(sc)) {
        show('sundayDaysCol');
        var lbl = document.getElementById('sundayDaysLabel');
        var tip = document.getElementById('sundayTip');
        if (sc === 'enroll') {
            lbl.innerHTML = '预计参加周日天数 <span class="auto-calc-badge">自动计算</span>';
            tip.innerText = "系统已根据入学日期自动算出剩余周日数。";
        } else if (sc === 'withdraw' || sc === 'suspend') {
            lbl.innerHTML = '已参加的周日天数 <span class="auto-calc-badge">自动计算</span>';
            tip.innerText = "系统已根据入学和变动日期自动算出。";
        } else if (sc === 'leave') {
            lbl.innerText = "请假包含的周日天数 (手工填写)";
            tip.innerText = "若请假跨周日请手动输入。";
            document.getElementById('sundayDays').value = '';
        } else if (sc === 'trial_fail') {
            lbl.innerText = "试读包含的周日天数 (手工填写)";
            tip.innerText = "若试读跨周日请手动输入。";
            document.getElementById('sundayDays').value = '';
        }
    }
}

function autoCalculateDays() {
    var sc = document.getElementById('scenario').value;
    var key = document.getElementById('semester').value;
    var endDate = document.getElementById('endDate').value;
    var enrollDate = document.getElementById('enrollDate').value;
    var eventDate = document.getElementById('eventDate').value;
    if (!enrollDate) return;
    var attended = 0, absent = 0, sunCount = 0;
    if (sc === 'enroll') {
        attended = getWorkingDays(enrollDate, endDate);
        absent = currentConfig.days - attended;
        if (absent < 0) absent = 0;
        if (key === 'middle_s2_g3') sunCount = getSundayDays(enrollDate, endDate);
    } else if (sc === 'withdraw' || sc === 'suspend') {
        if (!eventDate) return;
        var evObj = parseDate(eventDate);
        evObj.setDate(evObj.getDate() - 1);
        var lastDay = formatDate(evObj);
        if (parseDate(lastDay) < parseDate(enrollDate)) {
            attended = 0;
        } else {
            attended = getWorkingDays(enrollDate, lastDay);
        }
        absent = getWorkingDays(eventDate, endDate);
        if (key === 'middle_s2_g3') {
            if (parseDate(lastDay) >= parseDate(enrollDate)) {
                sunCount = getSundayDays(enrollDate, lastDay);
            }
        }
    }
    document.getElementById('attendedDays').value = attended > 0 ? attended : 0;
    document.getElementById('absentDays').value = absent > 0 ? absent : 0;
    if (key === 'middle_s2_g3' && (sc === 'enroll' || sc === 'withdraw' || sc === 'suspend')) {
        document.getElementById('sundayDays').value = sunCount > 12 ? 12 : sunCount;
    }
}

function syncAbsentDays() {
    var att = parseInt(document.getElementById('attendedDays').value) || 0;
    document.getElementById('absentDays').value = Math.max(currentConfig.days - att, 0);
}
function syncAttendedDays() {
    var abs = parseInt(document.getElementById('absentDays').value) || 0;
    document.getElementById('attendedDays').value = Math.max(currentConfig.days - abs, 0);
}

// ==================== 主计算函数 ====================
function calculate() {
    var sc = document.getElementById('scenario').value;
    var isPrimary = document.querySelector('input[name="school"]:checked').value === 'primary';
    var key = document.getElementById('semester').value;

    if (sc === 'force_quit') {
        document.getElementById('detailsBox').innerHTML = '<div class="warning-box">⚠️ 强制转学情况特殊，请开会沟通并根据会议决议手动核算退费金额。</div>';
        document.getElementById('totalAmountBox').style.display = 'none';
        return;
    }
    document.getElementById('totalAmountBox').style.display = 'block';

    var baseTuition = parseFloat(document.getElementById('studentType').value);
    var service = document.getElementById('serviceType').value;
    var attended = parseInt(document.getElementById('attendedDays').value) || 0;
    var absent = parseInt(document.getElementById('absentDays').value) || 0;
    var sundayDays = parseInt(document.getElementById('sundayDays').value) || 0;
    var rate = currentConfig.mealRate;
    var cap = currentConfig.mealCap;
    var enrollStr = document.getElementById('enrollDate').value || currentConfig.start;
    var eventStr = document.getElementById('eventDate').value || currentConfig.start;
    var startStr = currentConfig.start;
    var endStr = currentConfig.end;

    var detailsHtml = '';
    var total = 0;

    // ==================== 1. 入学（收费）====================
    if (sc === 'enroll') {
        var ratioResult = getTuitionRatio(startStr, enrollStr);
        var ratio = ratioResult.ratio;
        var ratioText = ratioResult.text;
        var tuitionCharge = baseTuition * ratio;
        if (baseTuition > 0) {
            detailsHtml += makeItem('学费 (按' + ratioText + '收取)', '收 ¥ ' + tuitionCharge.toFixed(2));
        }
        total += tuitionCharge;

        if (service === 'board') {
            var accCharge = currentConfig.acc * ratio;
            detailsHtml += makeItem('住宿费 (按' + ratioText + '收取)', '收 ¥ ' + accCharge.toFixed(2));
            total += accCharge;
        }

        var busChargeVal = 0;
        if (service === 'bus' && currentConfig.bus > 0) {
            var busResult = calcBusCharge(enrollStr, endStr, startStr, currentConfig.bus);
            busChargeVal = busResult.charge;
            detailsHtml += makeItem('校车费', '收 ¥ ' + busChargeVal.toFixed(2), busResult.note);
            total += busChargeVal;
        }

        var delayChargeVal = 0;
        if (currentConfig.delay > 0) {
            var delayResult = calcDelayCharge(enrollStr, endStr, startStr, currentConfig.delay);
            delayChargeVal = delayResult.charge;
            detailsHtml += makeItem('延时服务费', '收 ¥ ' + delayChargeVal.toFixed(2), delayResult.note);
            total += delayChargeVal;
        }

        var mealResult = calcMealCharge(attended, absent, rate, cap);
        detailsHtml += makeItem('日常餐费 (按实际来的天数计算：' + attended + '天 × ' + rate + '元 = ' + (attended * rate).toFixed(2) + '元)', '收 ¥ ' + mealResult.charge.toFixed(2), mealResult.note);
        total += mealResult.charge;

        var sunCharge = 0;
        if (currentConfig.sunRate) {
            sunCharge = sundayDays * currentConfig.sunRate;
            detailsHtml += makeItem('初三周日餐费 (' + sundayDays + '天×18元)', '收 ¥ ' + sunCharge.toFixed(2));
            total += sunCharge;
        }

        document.getElementById('totalAmountBox').innerHTML = '应收合计：<span id="totalAmount">¥ ' + total.toFixed(2) + '</span>';
    }

    // ==================== 2. 转学 / 休学（退费）====================
    else if (sc === 'withdraw' || sc === 'suspend') {
        var ratioResult2 = getTuitionRatio(startStr, enrollStr);
        var ratio2 = ratioResult2.ratio;
        var ratioText2 = ratioResult2.text;
        var paidTuition = baseTuition * ratio2;
        var paidAcc = (service === 'board') ? currentConfig.acc * ratio2 : 0;

        var enrollToEnd = getWorkingDays(enrollStr, endStr);
        var missedBeforeEnroll = currentConfig.days - enrollToEnd;
        if (missedBeforeEnroll < 0) missedBeforeEnroll = 0;
        var paidMealResult = calcMealCharge(enrollToEnd, missedBeforeEnroll, rate, cap);
        var paidMeal = paidMealResult.charge;

        var paidBus = 0;
        if (service === 'bus' && currentConfig.bus > 0) {
            var busResult2 = calcBusCharge(enrollStr, endStr, startStr, currentConfig.bus);
            paidBus = busResult2.charge;
        }

        var paidDelay = 0;
        if (currentConfig.delay > 0) {
            var delayResult2 = calcDelayCharge(enrollStr, endStr, startStr, currentConfig.delay);
            paidDelay = delayResult2.charge;
        }

        var paidSunMeal = 0;
        if (currentConfig.sunRate) {
            var totalSunFromEnroll = getSundayDays(enrollStr, endStr);
            if (totalSunFromEnroll > currentConfig.sunTotal) totalSunFromEnroll = currentConfig.sunTotal;
            paidSunMeal = totalSunFromEnroll * currentConfig.sunRate;
        }

        // === 当天入学当天退学：全退 ===
        var isSameDayQuit = (enrollStr === eventStr);
        if (isSameDayQuit) {
            if (baseTuition > 0) detailsHtml += makeItem('学费全退', '<span style="color:green;">退 ¥ ' + paidTuition.toFixed(2) + '</span>', '当天入学当天退学，全额退还');
            if (service === 'board') detailsHtml += makeItem('住宿费全退', '<span style="color:green;">退 ¥ ' + paidAcc.toFixed(2) + '</span>', '当天入学当天退学，全额退还');
            if (service === 'bus' && paidBus > 0) detailsHtml += makeItem('校车费全退', '<span style="color:green;">退 ¥ ' + paidBus.toFixed(2) + '</span>', '当天入学当天退学，全额退还');
            detailsHtml += makeItem('日常餐费全退', '<span style="color:green;">退 ¥ ' + paidMeal.toFixed(2) + '</span>', '当天入学当天退学，全额退还');
            if (currentConfig.sunRate) {
                detailsHtml += makeItem('初三周日餐费全退', '<span style="color:green;">退 ¥ ' + paidSunMeal.toFixed(2) + '</span>', '当天入学当天退学，全额退还');
            }
            if (currentConfig.delay > 0) {
                detailsHtml += makeItem('延时服务费全退 (仅供参考，不计入总额)', '<span style="color:#7f8c8d;">退 ¥ ' + paidDelay.toFixed(2) + '</span>', '当天入学当天退学，全额退还。<br><span style="color:#e74c3c; font-weight:bold;">⚠️ 一般退费不退延时费，请假不退延时费，延时费退费不计入应退总额中</span>');
            }
            total = paidTuition + paidAcc + paidMeal + paidBus + paidSunMeal;
            if (sc === 'suspend' && isPrimary) {
                total -= 1000;
                if (total < 0) total = 0;
                detailsHtml += makeItem('休学学杂费 (教材费等)', '<span style="color:red;">扣除 ¥ 1000.00</span>');
            }
            document.getElementById('detailsBox').innerHTML = detailsHtml;
            document.getElementById('totalAmountBox').innerHTML = '应退合计：<span id="totalAmount" style="color:green;">¥ ' + total.toFixed(2) + '</span>';
            return;
        }

        // === 正常退学/休学流程 ===
        var overOneMonth = isOverOneMonth(enrollStr, eventStr);

        // 学费退费
        var tuitionRefund = 0;
        if (baseTuition > 0) {
            if (!overOneMonth) {
                tuitionRefund = paidTuition - baseTuition * 0.3;
                if (tuitionRefund < 0) tuitionRefund = 0;
                detailsHtml += makeItem('学费退费 (入读未满1月)', '<span style="color:green;">退 ¥ ' + tuitionRefund.toFixed(2) + '</span>', '实收 ' + paidTuition.toFixed(2) + '(' + ratioText2 + ') - 原总额' + baseTuition + '×30% = ' + tuitionRefund.toFixed(2));
            } else {
                detailsHtml += makeItem('学费退费 (入读超过1个月)', '<span style="color:#e74c3c;">不予清退</span>');
            }
        }

        // 住宿费退费
        var accRefund = 0;
        if (service === 'board') {
            if (!overOneMonth) {
                accRefund = paidAcc - currentConfig.acc * 0.3;
                if (accRefund < 0) accRefund = 0;
                detailsHtml += makeItem('住宿费退费 (入读未满1月)', '<span style="color:green;">退 ¥ ' + accRefund.toFixed(2) + '</span>', '实收 ' + paidAcc.toFixed(2) + '(' + ratioText2 + ') - 原总额' + currentConfig.acc + '×30% = ' + accRefund.toFixed(2));
            } else {
                detailsHtml += makeItem('住宿费退费 (入读超过1个月)', '<span style="color:#e74c3c;">不予清退</span>');
            }
        }

        // 校车费退费
        var busRefund = 0;
        if (service === 'bus' && currentConfig.bus > 0) {
            var busRefResult = calcBusRefund(attended, currentConfig.days, paidBus);
            busRefund = busRefResult.refund;
            detailsHtml += makeItem('校车费退费', '<span style="color:green;">退 ¥ ' + busRefund.toFixed(2) + '</span>', busRefResult.note);
        }

        // 延时服务费退费（只显示不计入总额）
        var delayRefund = 0;
        if (currentConfig.delay > 0) {
            var delayRefResult = calcDelayRefund(enrollStr, eventStr, endStr, startStr, currentConfig.delay, paidDelay);
            delayRefund = delayRefResult.refund;
            detailsHtml += makeItem('延时服务费退费 (仅供参考，不计入总额)', '<span style="color:#7f8c8d;">退 ¥ ' + delayRefund.toFixed(2) + '</span>', delayRefResult.note + '<br><span style="color:#e74c3c; font-weight:bold;">⚠️ 一般退费不退延时费，请假不退延时费，延时费退费不计入应退总额中</span>');
        }

        // 日常餐费退费（退费取低者）
        var mealRefResult = calcMealRefund(attended, absent, rate, paidMeal);
        var mealRefund = mealRefResult.refund;
        detailsHtml += makeItem('日常餐费退费', '<span style="color:green;">退 ¥ ' + mealRefund.toFixed(2) + '</span>', mealRefResult.note);

        // 初三周日餐费退费
        var sunRefund = 0;
        if (currentConfig.sunRate) {
            var sunNotAttended = currentConfig.sunTotal - sundayDays;
            if (sunNotAttended < 0) sunNotAttended = 0;
            sunRefund = sunNotAttended * currentConfig.sunRate;
            detailsHtml += makeItem('初三周日餐费退费 (总' + currentConfig.sunTotal + '天 - 已上' + sundayDays + '天)×18', '<span style="color:green;">退 ¥ ' + sunRefund.toFixed(2) + '</span>');
        }

        // 休学学杂费（小学扣1000）
        var miscDeduct = 0;
        if (sc === 'suspend' && isPrimary) {
            miscDeduct = 1000;
            detailsHtml += makeItem('休学学杂费 (教材费等)', '<span style="color:red;">扣除 ¥ ' + miscDeduct.toFixed(2) + '</span>');
        }

        // 总额（延时费不计入）
        total = tuitionRefund + accRefund + busRefund + mealRefund + sunRefund - miscDeduct;
        if (total < 0) total = 0;
        document.getElementById('totalAmountBox').innerHTML = '应退合计：<span id="totalAmount" style="color:green;">¥ ' + total.toFixed(2) + '</span>';
    }

    // ==================== 3. 请假（退费）====================
    else if (sc === 'leave') {
        var leaveDays = parseInt(document.getElementById('leaveDays').value) || 0;
        detailsHtml += makeItem('学费/住宿费', '请假不退还');

        var mealRefundLeave = leaveDays * rate;
        detailsHtml += makeItem('日常餐费退费 (' + leaveDays + '天 × ' + rate + '元)', '<span style="color:green;">退 ¥ ' + mealRefundLeave.toFixed(2) + '</span>');
        total += mealRefundLeave;

        if (service === 'bus' && currentConfig.bus > 0) {
            var busRefundLeave = (currentConfig.bus / currentConfig.days) * leaveDays;
            detailsHtml += makeItem('校车费退费 (' + currentConfig.bus + ' ÷ ' + currentConfig.days + '天 × ' + leaveDays + '天)', '<span style="color:green;">退 ¥ ' + busRefundLeave.toFixed(2) + '</span>');
            total += busRefundLeave;
        }

        // 初中请假时延时费不退、不计算、不显示

        if (currentConfig.sunRate && sundayDays > 0) {
            var sunRefundLeave = sundayDays * currentConfig.sunRate;
            detailsHtml += makeItem('初三周日餐费退费 (请假' + sundayDays + '个周日×18元/天)', '<span style="color:green;">退 ¥ ' + sunRefundLeave.toFixed(2) + '</span>');
            total += sunRefundLeave;
        }

        document.getElementById('totalAmountBox').innerHTML = '应退合计：<span id="totalAmount" style="color:green;">¥ ' + total.toFixed(2) + '</span>';
    }

    // ==================== 4. 试读代收费结算 ====================
    else if (sc === 'trial_fail') {
        var trialDays = parseInt(document.getElementById('trialDays').value) || 0;
        detailsHtml += '<div class="warning-box">💡 政策提示：若试读未录取，不收取任何费用(全额为0)。此计算仅适用于【录取了但未立即入读(超3个工作日)】的试读期间代收费结算。</div>';
        detailsHtml += makeItem('学费', '不收取 ¥ 0.00');
        detailsHtml += makeItem('住宿费', '不收取 ¥ 0.00');

        var trialMeal = trialDays * 60;
        detailsHtml += makeItem('试读餐费 (' + trialDays + '天 × 60元/天)', '收 ¥ ' + trialMeal.toFixed(2));
        total += trialMeal;

        if (service === 'bus') {
            var trialBus = trialDays * 80;
            detailsHtml += makeItem('试读校车费 (' + trialDays + '天 × 80元/天)', '收 ¥ ' + trialBus.toFixed(2));
            total += trialBus;
        }

        if (currentConfig.sunRate && sundayDays > 0) {
            var sunChargeTrial = sundayDays * currentConfig.sunRate;
            detailsHtml += makeItem('初三周日餐费 (' + sundayDays + '天×18元)', '收 ¥ ' + sunChargeTrial.toFixed(2));
            total += sunChargeTrial;
        }

        document.getElementById('totalAmountBox').innerHTML = '应收代收费合计：<span id="totalAmount">¥ ' + total.toFixed(2) + '</span>';
    }

    // ==================== 5. 住宿转校车（小学）====================
    else if (sc === 'board_to_bus') {
        var enrollD_btb = document.getElementById('enrollDate').value || startStr;
        var overOne_btb = isOverOneMonth(enrollD_btb, eventStr);

        if (overOne_btb) {
            detailsHtml += makeItem('差价退还', '¥ 0.00');
            detailsHtml += '<div class="tip" style="color:#e74c3c; font-weight:bold;">注：自入学日(' + enrollD_btb + ')起已超过一个月，按规定住宿转校车不予退还差价。</div>';
            total = 0;
        } else {
            var accMonthRate_btb = currentConfig.acc / 5;
            var busMonthRate_btb = currentConfig.bus / 5;
            var diffMonthRate_btb = accMonthRate_btb - busMonthRate_btb;

            var dayBefore_btb = new Date(parseDate(eventStr));
            dayBefore_btb.setDate(dayBefore_btb.getDate() - 1);
            var consumedMonths_btb = 0;
            if (dayBefore_btb >= parseDate(startStr)) {
                consumedMonths_btb = calcNaturalMonths(startStr, formatDate(dayBefore_btb), startStr, 'charge');
            }
            var remainMonths_btb = 5 - consumedMonths_btb;
            if (remainMonths_btb < 0) remainMonths_btb = 0;

            var refundAmount_btb = remainMonths_btb * diffMonthRate_btb;
            detailsHtml += makeItem('差价退还 (' + remainMonths_btb + '个月 × ' + diffMonthRate_btb + '元/月)', '<span style="color:green; font-weight:bold;">退 ¥ ' + refundAmount_btb.toFixed(2) + '</span>', '学期按5个自然月核算(以开学' + startStr + '为锚点)。已消费' + consumedMonths_btb + '个月，剩余' + remainMonths_btb + '个月。住宿月费' + accMonthRate_btb + '元-校车月费' + busMonthRate_btb + '元=差价' + diffMonthRate_btb + '元/月');
            total = refundAmount_btb;
        }
        document.getElementById('totalAmountBox').innerHTML = '应退合计：<span id="totalAmount" style="color:green;">¥ ' + total.toFixed(2) + '</span>';
    }

    // ==================== 6. 校车转住宿（小学）====================
    else if (sc === 'bus_to_board') {
        var busStartD = document.getElementById('busDate').value || startStr;
        var accMonthRate_bto = currentConfig.acc / 5;
        var busMonthRate_bto = currentConfig.bus / 5;
        var diffMonthRate_bto = accMonthRate_bto - busMonthRate_bto;

        var dayBefore_bto = new Date(parseDate(eventStr));
        dayBefore_bto.setDate(dayBefore_bto.getDate() - 1);
        var consumedMonths_bto = 0;
        if (dayBefore_bto >= parseDate(busStartD)) {
            consumedMonths_bto = calcNaturalMonths(busStartD, formatDate(dayBefore_bto), startStr, 'deduct');
        }
        var remainMonths_bto = 5 - consumedMonths_bto;
        if (remainMonths_bto < 0) remainMonths_bto = 0;

        var chargeAmount_bto = remainMonths_bto * diffMonthRate_bto;
        detailsHtml += makeItem('差价补缴 (' + remainMonths_bto + '个月 × ' + diffMonthRate_bto + '元/月)', '收 ¥ ' + chargeAmount_bto.toFixed(2), '学期按5个自然月核算(以开学' + startStr + '为锚点)。从乘坐校车日(' + busStartD + ')起已消费' + consumedMonths_bto + '个月，剩余' + remainMonths_bto + '个月需补差价。住宿月费' + accMonthRate_bto + '元-校车月费' + busMonthRate_bto + '元=差价' + diffMonthRate_bto + '元/月。不足半月按半月计算。');
        total = chargeAmount_bto;
        document.getElementById('totalAmountBox').innerHTML = '应收合计：<span id="totalAmount">¥ ' + total.toFixed(2) + '</span>';
    }

    document.getElementById('detailsBox').innerHTML = detailsHtml;
}
</script>
</body>
</html>
